<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>세종북부서 재난상황실</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* 애플(iOS) 스타일 다크모드 색상표 */
            --bg: #000000; 
            --card: #1c1c1e; 
            --card-elevated: #2c2c2e;
            --text: #ffffff; 
            --sub: #8e8e93;
            --line: #38383a; 
            --blue: #0a84ff; 
            --red: #ff453a; 
            --green: #30d158; 
            --orange: #ff9f0a; 
            --forest: #32d74b;
            --shelter: #ffd60a; 
            --kakao: #FAE100; 
            --snow: #64d2ff;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Pretendard", sans-serif;
            margin: 0; padding: env(safe-area-inset-top) 20px 40px 20px;
            -webkit-tap-highlight-color: transparent; user-select: none;
            letter-spacing: -0.3px;
        }

        header { margin-bottom: 20px; padding-top: 10px; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .title-group { display: flex; align-items: center; gap: 10px; }
        h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        
        .refresh-btn {
            background: var(--card-elevated); color: var(--blue);
            width: 36px; height: 36px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px; transition: 0.2s;
        }
        .refresh-btn:active { background: #3a3a3c; transform: scale(0.9); }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 애플 스타일 카드 섹션 */
        .accord-section {
            background: var(--card); border: none;
            border-radius: 20px; overflow: hidden; margin-bottom: 16px;
        }
        
        .accord-header {
            padding: 18px 20px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; user-select: none; background: transparent; transition: background 0.2s;
        }
        .accord-header:active { background: #222; }
        
        .ah-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 10px; color: #fff; flex: 1; }
        .ah-title i { font-size: 16px; width: 20px; text-align: center; } /* 아이콘 정렬 */
        .ah-toggle { color: var(--sub); transition: 0.3s; font-size: 14px; margin-left: 10px; }
        
        .accord-content { display: none; padding: 0 20px 20px 20px; animation: slideDown 0.3s ease forwards; }
        .accord-section.open .accord-content { display: block; }
        .accord-section.open .ah-toggle { transform: rotate(180deg); }

        .sejong-summary {
            font-size: 13px; font-weight: 600; color: var(--text);
            background: var(--card-elevated); padding: 5px 12px; border-radius: 12px;
            display: inline-block; margin-left: auto;
        }
        .sejong-summary.warn { background: rgba(255, 69, 58, 0.2); color: var(--red); animation: blink 2s infinite; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 50% { opacity: 0.6; } }

        /* 기상특보 텍스트 영역 */
        .info-group { margin-bottom: 12px; }
        .info-label { font-size: 12px; color: var(--sub); font-weight: 600; display: block; margin-bottom: 6px; }
        .info-val { font-size: 15px; font-weight: 500; line-height: 1.5; color: #fff; }
        .info-val.time { color: var(--orange); }
        .info-val.content { 
            background: var(--card-elevated); padding: 14px; border-radius: 14px; 
            white-space: pre-wrap; word-break: keep-all; font-size: 14px;
        }

        /* 격자형 데이터 (강우량, 적설량 등) 애플스타일 위젯화 */
        .rain-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 8px; background: transparent; border: none;
        }
        .rain-cell { background: var(--card-elevated); padding: 12px 4px; text-align: center; border-radius: 12px; }
        .rain-loc { font-size: 12px; color: var(--sub); margin-bottom: 6px; font-weight: 600; }
        .rain-val { font-size: 15px; font-weight: 800; color: white; }
        .rain-val.wet { color: var(--blue); }
        .rain-val.snowing { color: var(--snow); }
        
        .rain-avg-box { text-align: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
        .rain-avg-val { font-size: 28px; font-weight: 800; color: var(--blue); margin-top: 4px; letter-spacing:-1px;}
        .snow-avg-val { font-size: 28px; font-weight: 800; color: var(--snow); margin-top: 4px; letter-spacing:-1px;}

        /* 대피소 카드 애플스타일 적용 */
        .shelter-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .shelter-card {
            background: var(--card-elevated); padding: 10px 6px; 
            border-radius: 14px; display: flex; flex-direction: column; 
            align-items: center; box-sizing: border-box;
        }
        .shelter-name { 
            font-size: 11px; font-weight: 700; color: #fff; width: 100%;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center;
        }
        .shelter-addr { 
            font-size: 9px; color: var(--sub); width: 100%;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; margin-top: 2px;
        }
        .shelter-cap { font-size: 10px; color: var(--shelter); font-weight: 700; margin: 6px 0; }
        
        /* 버튼 세로 정렬 및 크기 최적화 */
        .shelter-btn-group { display: flex; flex-direction: column; gap: 4px; width: 100%; margin-top: auto; }
        .shelter-btn {
            background: var(--kakao); color: #3b1e1e;
            text-align: center; padding: 6px 0; width: 100%;
            border-radius: 8px; font-size: 10px; font-weight: 700; text-decoration: none;
            display: flex; align-items: center; justify-content: center; border: none;
            transition: all 0.2s; cursor: pointer;
        }
        .shelter-btn.call { background: var(--green); color: white; }
        .shelter-btn:active { transform: scale(0.95); opacity: 0.8; }
        .shelter-btn i { font-size: 10px; margin-right: 4px; }

        /* CCTV 카드 애플스타일 */
        .cctv-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 420px; overflow-y: auto; padding-right: 4px; }
        .cctv-card {
            background: var(--card-elevated); padding: 12px; border-radius: 16px;
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 95px; cursor: pointer; transition: 0.2s;
        }
        .cctv-card:active { transform: scale(0.96); opacity: 0.8; }
        .cctv-icon { 
            font-size: 26px; color: var(--blue); margin: 12px auto; display: block; text-align: center; 
        }
        .cctv-btn {
            background: rgba(10, 132, 255, 0.15); color: var(--blue); font-size: 11px; padding: 6px; 
            text-align: center; border-radius: 8px; font-weight: 700; margin-top: auto;
        }

        /* 도로 통제 현황 애플스타일 */
        .list-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .traffic-card {
            background: var(--card-elevated); padding: 10px; border-radius: 14px;
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 85px; position: relative;
        }
        .card-info { margin-bottom: 6px; }
        .area-tag { font-size: 10px; color: var(--sub); background: #1c1c1e; padding: 2px 6px; border-radius: 6px; align-self: flex-start; margin-bottom: 6px; display: inline-block; font-weight:600;}
        .loc-name { font-size: 12px; font-weight: 700; line-height: 1.3; word-break: keep-all; }
        .status-btn { 
            font-size: 11px; font-weight: 800; padding: 6px; border-radius: 8px; 
            text-align: center; width: 100%; box-sizing: border-box; cursor: pointer;
        }
        .st-ban { background: var(--red); color: white; }
        .st-free { background: rgba(48, 209, 88, 0.15); color: var(--green); }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .dash-item { background: var(--card-elevated); padding: 16px; border-radius: 16px; text-align: center; }
        .dash-val { font-size: 24px; font-weight: 800; display: block; margin-bottom:4px;}
        .c-red { color: var(--red); } .c-green { color: var(--green); }

        .admin-btn {
            background: transparent; color: var(--sub); border: none;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .admin-btn.active { color: var(--red); }

        /* 필터 및 검색바 (iOS 스타일 둥근 검색창) */
        .filter-area { margin-bottom: 16px; display: flex; flex-direction: column; gap: 12px; }
        .search-row { display: flex; gap: 8px; }
        .search-input { 
            flex: 1; background: var(--card-elevated); border: none; padding: 12px 16px; 
            border-radius: 20px; color: white; box-sizing: border-box; font-size: 14px; 
        }
        .search-input:focus { outline: 2px solid var(--blue); }
        
        .add-loc-btn {
            background: var(--blue); color: white; border: none; padding: 0 16px;
            border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer;
            white-space: nowrap; display: none;
        }

        .filter-group { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filter-group::-webkit-scrollbar { display: none; }
        .filter-btn { 
            background: var(--card-elevated); color: var(--sub); border: none; 
            padding: 8px 14px; border-radius: 20px; font-size: 12px; white-space: nowrap; font-weight:600;
        }
        .filter-btn.active { background: var(--text); color: var(--bg); font-weight: 800; }

        .official-links { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 30px; margin-bottom: 20px; }
        .link-btn { background: var(--card); padding: 16px; border-radius: 16px; text-decoration: none; color: white; font-size: 14px; font-weight:700; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* 모달 팝업 */
        #cctv-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 2000; flex-direction: column;
        }
        .cctv-modal-header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .cctv-modal-title { color: white; font-weight: 800; font-size: 18px; width:80%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cctv-modal-close { color: rgba(255,255,255,0.6); font-size: 28px; cursor: pointer; padding: 5px; }
        
        .cctv-frame-container { flex: 1; position: relative; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        video { width: 100%; max-height: 100%; object-fit: contain; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .cctv-fallback {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 90%; z-index: 100;
        }
        .fallback-btn {
            background: rgba(10, 132, 255, 0.9); color: white; padding: 14px 24px; border-radius: 20px;
            text-decoration: none; font-weight: 700; display: inline-block; font-size: 14px; 
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        
        #sync-status {
            position: fixed; bottom: 15px; right: 15px; 
            font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5); background: rgba(0,0,0,0.6);
            padding: 4px 10px; border-radius: 14px; pointer-events: none; backdrop-filter: blur(5px);
        }
        .live { color: var(--green) !important; }

        .forest-body { display: flex; justify-content: space-between; align-items: center; padding: 5px; }
        .forest-status { font-size: 24px; font-weight: 800; color: white; display: flex; align-items: center; gap: 10px; }
        .forest-link-btn { font-size: 12px; font-weight:700; color: var(--forest); background: rgba(50, 215, 75, 0.15); padding: 6px 12px; border-radius: 14px; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <div class="top-nav">
        <div class="title-group">
            <h1>세종북부서 재난상황</h1>
        </div>
        <div style="display:flex; gap:12px; align-items:center;">
            <button id="admin-btn" class="admin-btn" onclick="toggleAdmin()">관리자</button>
            <button class="refresh-btn" onclick="refreshAll()" title="새로고침">
                <i id="refresh-icon" class="fas fa-rotate-right"></i>
            </button>
        </div>
    </div>
</header>

<div class="accord-section" id="sec-weather">
    <div class="accord-header" onclick="toggleSection('sec-weather')">
        <div class="ah-title"><i class="fas fa-tower-broadcast" style="color:var(--orange)"></i> 기상특보</div>
        <div id="sejong-status" class="sejong-summary">확인중...</div>
        <div class="ah-toggle"><i class="fas fa-chevron-down"></i></div>
    </div>
    <div class="accord-content" id="monitor-content">
        <div style="text-align:center; color:var(--sub); padding:10px;"><i class="fas fa-spinner fa-spin"></i> 수신중...</div>
    </div>
</div>

<div class="accord-section" id="sec-rain">
    <div class="accord-header" onclick="toggleSection('sec-rain')">
        <div class="ah-title"><i class="fas fa-cloud-showers-heavy" style="color:var(--blue)"></i> 지역별 강우량 및 기온</div>
        <div class="ah-toggle"><i class="fas fa-chevron-down"></i></div>
    </div>
    <div class="accord-content">
        <div class="rain-avg-box">
            <div style="font-size:12px; color:var(--sub); font-weight:600;">7개 읍면 일평균 강수</div>
            <div class="rain-avg-val" id="avg-rain-val">- mm</div>
        </div>
        <div class="rain-grid" id="rain-grid"></div>
    </div>
</div>

<div class="accord-section" id="sec-snow">
    <div class="accord-header" onclick="toggleSection('sec-snow')">
        <div class="ah-title"><i class="fas fa-snowflake" style="color:var(--snow)"></i> 지역별 예상 적설량</div>
        <div class="ah-toggle"><i class="fas fa-chevron-down"></i></div>
    </div>
    <div class="accord-content">
        <div class="rain-avg-box">
            <div style="font-size:12px; color:var(--sub); font-weight:600;">7개 읍면 일평균 적설</div>
            <div class="snow-avg-val" id="avg-snow-val">- cm</div>
        </div>
        <div class="rain-grid" id="snow-grid"></div>
    </div>
</div>

<div class="accord-section" id="sec-forest">
    <div class="accord-header" onclick="toggleSection('sec-forest')">
        <div class="ah-title"><i class="fas fa-tree" style="color:var(--forest)"></i> 산불위험지수</div>
        <div class="ah-toggle"><i class="fas fa-chevron-down"></i></div>
    </div>
    <div class="accord-content">
        <div class="forest-body" style="margin-bottom: 15px;">
            <div>
                <div style="font-size:11px; color:var(--sub); margin-bottom:4px; font-weight:600;">실시간 공공데이터포털 연동</div>
                <div class="forest-status" id="forest-status-text" style="font-size:16px;">
                    <i class="fas fa-spinner fa-spin"></i> API 연결 중...
                </div>
            </div>
            <a href="https://forestfire.nifos.go.kr" target="_blank" class="forest-link-btn">산림청 보기</a>
        </div>
        <div class="rain-grid" id="forest-grid"></div>
    </div>
</div>

<div class="accord-section" id="sec-control">
    <div class="accord-header" onclick="toggleSection('sec-control')">
        <div class="ah-title"><i class="fas fa-road" style="color:#ff375f"></i> 도로 통제 현황</div>
        <div class="ah-toggle"><i class="fas fa-chevron-down"></i></div>
    </div>
    <div class="accord-content">
        <div class="dashboard">
            <div class="dash-item">
                <span class="dash-val c-red" id="cnt-ban">0</span>
                <span style="font-size:12px; color:var(--sub); font-weight:600;">통제구역</span>
            </div>
            <div class="dash-item">
                <span class="dash-val" id="cnt-total">16</span>
                <span style="font-size:12px; color:var(--sub); font-weight:600;">전체관리</span>
            </div>
        </div>

        <div class="filter-area">
            <div class="search-row">
                <input type="text" class="search-input" id="search" placeholder="장소명 검색" onkeyup="render()">
                <button class="add-loc-btn" id="add-loc-btn" onclick="addTrafficLocation()">+ 추가</button>
            </div>
            <div class="filter-group">
                <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
                <button class="filter-btn" onclick="setFilter('ban', this)">🚨 통제</button>
                <button class="filter-btn" onclick="setFilter('free', this)">✅ 정상</button>
                <button class="filter-btn" onclick="setFilter('조치원', this)">조치원</button>
                <button class="filter-btn" onclick="setFilter('전의', this)">전의</button>
                <button class="filter-btn" onclick="setFilter('부강', this)">부강</button>
            </div>
        </div>
        
        <div class="list-container" id="list"></div>
    </div>
</div>

<div class="accord-section" id="sec-shelter">
    <div class="accord-header" onclick="toggleSection('sec-shelter')">
        <div class="ah-title"><i class="fas fa-person-shelter" style="color:var(--shelter)"></i> 대피소 현황 (69개소)</div>
        <div class="ah-toggle"><i class="fas fa-chevron-down"></i></div>
    </div>
    <div class="accord-content">
        <div class="filter-group" style="margin-bottom:15px;">
            <button class="filter-btn active" onclick="filterShelter('전체', this)">전체</button>
            <button class="filter-btn" onclick="filterShelter('조치원', this)">조치원</button>
            <button class="filter-btn" onclick="filterShelter('연서', this)">연서</button>
            <button class="filter-btn" onclick="filterShelter('전의', this)">전의</button>
            <button class="filter-btn" onclick="filterShelter('전동', this)">전동</button>
            <button class="filter-btn" onclick="filterShelter('소정', this)">소정</button>
            <button class="filter-btn" onclick="filterShelter('부강', this)">부강</button>
            <button class="filter-btn" onclick="filterShelter('연동', this)">연동</button>
        </div>
        <div class="shelter-list" id="shelter-list"></div>
    </div>
</div>

<div class="accord-section" id="sec-cctv">
    <div class="accord-header" onclick="toggleSection('sec-cctv')">
        <div class="ah-title"><i class="fas fa-video" style="color:#5e5ce6"></i> 실시간 CCTV 영상망</div>
        <div class="ah-toggle"><i class="fas fa-chevron-down"></i></div>
    </div>
    <div class="accord-content">
        <div class="filter-group" style="margin-bottom:15px;">
            <button class="filter-btn active" onclick="setCCTVFilter('all', this)">관내전체</button>
            <button class="filter-btn" onclick="setCCTVFilter('조치원', this)">조치원</button>
            <button class="filter-btn" onclick="setCCTVFilter('연서', this)">연서</button>
            <button class="filter-btn" onclick="setCCTVFilter('전의', this)">전의</button>
            <button class="filter-btn" onclick="setCCTVFilter('전동', this)">전동</button>
            <button class="filter-btn" onclick="setCCTVFilter('소정', this)">소정</button>
            <button class="filter-btn" onclick="setCCTVFilter('부강', this)">부강</button>
            <button class="filter-btn" onclick="setCCTVFilter('연동', this)">연동</button>
        </div>
        <div class="cctv-container" id="cctv-list"></div>
    </div>
</div>

<div class="official-links">
    <a href="https://www.sejong.go.kr/safety/sub01_07.do" target="_blank" class="link-btn"><i class="fas fa-address-book" style="color:var(--red)"></i> 비상연락망</a>
    <a href="tel:112" class="link-btn"><i class="fas fa-phone" style="color:var(--blue)"></i> 112 연결</a>
</div>

<div style="height:30px; text-align:center; padding-bottom: 20px;">
    <button onclick="resetData()" style="background:none; border:none; color:rgba(255,255,255,0.3); font-size:11px; text-decoration:underline;">[관리자] 데이터 초기화</button>
</div>

<div id="sync-status">● Live Sync</div>

<div id="cctv-modal">
    <div class="cctv-modal-header">
        <div class="cctv-modal-title" id="cctv-title">CCTV 영상</div>
        <div class="cctv-modal-close" onclick="closeCCTV()"><i class="fas fa-times-circle"></i></div>

    async function autoFetchCCTV() {
        const cctvContainer = document.getElementById('cctv-list');
        cctvContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:20px; color:var(--sub); font-size:12px;"><i class="fas fa-spinner fa-spin"></i> 국토부 영상망 고속 접속 중...</div>`;

        const targetUrl = "https://openapi.its.go.kr:9443/cctvInfo?apiKey=56934196b0354a48ab5a1d020262c673&type=its&cctvType=1&minX=127.140004294763&maxX=127.40809957074&minY=36.5529282846312&maxY=36.7324183697358&getType=xml";

        const proxies = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}&_=${Date.now()}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
        ];

        let rawText = "";

        try {
            const fetchPromises = proxies.map(proxy => 
                fetch(proxy).then(res => res.text()).then(text => {
                    if (text && text.includes('<response>')) return text;
                    throw new Error("Invalid Format");
                })
            );
            rawText = await Promise.any(fetchPromises);
        } catch (error) {
            console.log("모든 우회망 차단됨. 보조 캐시 데이터를 로드합니다.");
            rawText = fallbackXML;
        }

        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(rawText, "text/xml");

        const resultMsg = xmlDoc.querySelector("message, resultMsg, error");
        if (resultMsg && !xmlDoc.querySelector("data")) {
            cctvContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:15px; color:var(--orange); font-size:11px;">[서버 거절] ${resultMsg.textContent}</div>`;
            return;
        }

        const cctvNodes = xmlDoc.querySelectorAll("data");
        if (cctvNodes.length > 0) {
            let filteredData = [];
            
            Array.from(cctvNodes).forEach(node => {
                let area = null;
                const name = node.querySelector("cctvname") ? node.querySelector("cctvname").textContent : '';

                if (name.includes('서창') || name.includes('욱일') || name.includes('홍대') || name.includes('상리')) {
                    area = '조치원';
                } 
                else if (name.includes('조치원') || name.includes('번암') || name.includes('신안')) {
                    area = null;
                }
                else if (name.includes('연서') || name.includes('봉암') || name.includes('월하') || name.includes('쌍류')) area = '연서';
                else if (name.includes('전의') || name.includes('유천')) area = '전의';
                else if (name.includes('전동') || name.includes('심중') || name.includes('청송') || name.includes('석곡') || name.includes('미곡')) area = '전동';
                else if (name.includes('소정') || name.includes('운당') || name.includes('대평')) area = '소정';
                else if (name.includes('부강')) area = '부강';
                else if (name.includes('연동') || name.includes('명학') || name.includes('내판')) area = '연동';

                if (area) {
                    let rawUrl = node.querySelector("cctvurl") ? node.querySelector("cctvurl").textContent : '';
                    let secureUrl = rawUrl.replace('http://', 'https://');
                    filteredData.push({ area: area, name: name, url: secureUrl });
                }
            });

            dynamicCCTVData = filteredData;
            
            if(dynamicCCTVData.length > 0) {
                renderCCTV();
            } else {
                cctvContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:20px; color:var(--orange); font-size:12px;">선별된 거점 영상이 없습니다.</div>`;
            }
        } else {
            cctvContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:20px; color:var(--orange); font-size:12px;">송출 데이터가 없습니다.</div>`;
        }
    }

    function setCCTVFilter(type, btn) {
        cctvFilter = type;
        const group = btn.parentElement;
        group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCCTV();
    }

    function renderCCTV() {
        const container = document.getElementById('cctv-list');
        container.innerHTML = '';
        dynamicCCTVData.forEach(item => {
            if(cctvFilter !== 'all' && item.area !== cctvFilter) return;
            const div = document.createElement('div');
            div.className = 'cctv-card';
            div.onclick = () => openCCTV(item.name, item.url);
            div.innerHTML = `
                <div><span class="area-tag">${item.area}</span><div class="loc-name">${item.name}</div></div>
                <div class="cctv-icon"><i class="fas fa-play-circle"></i></div>
                <div class="cctv-btn">영상보기</div>
            `;
            container.appendChild(div);
        });
        if(container.innerHTML === '') {
            container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:20px; color:var(--sub); font-size:12px;">해당 지역에 등록된 영상이 없습니다.</div>`;
        }
    }

    function openCCTV(name, url) {
        document.getElementById('cctv-title').innerText = name;
        document.getElementById('cctv-link-btn').href = url; 
        
        const vid = document.getElementById('cctv-video');
        const ifr = document.getElementById('cctv-frame');
        
        if (hlsInstance) {
            hlsInstance.destroy();
            hlsInstance = null;
        }
        vid.pause();
        vid.removeAttribute('src');
        vid.load();
        ifr.src = '';

        if (url.includes('.m3u8') || url.includes('ktict.co.kr')) {
            vid.style.display = 'block';
            ifr.style.display = 'none';
            if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(vid);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    vid.play().catch(e => console.log('재생 방지됨'));
                });
            } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
                vid.src = url;
                vid.play().catch(e => console.log('재생 방지됨'));
            }
        } else {
            vid.style.display = 'none';
            ifr.style.display = 'block';
            ifr.src = url;
        }

        document.getElementById('cctv-modal').style.display = 'flex';
    }

    function closeCCTV() {
        document.getElementById('cctv-modal').style.display = 'none';
        const vid = document.getElementById('cctv-video');
        const ifr = document.getElementById('cctv-frame');
        if (hlsInstance) {
            hlsInstance.destroy();
            hlsInstance = null;
        }
        vid.pause();
        vid.removeAttribute('src');
        vid.load();
        ifr.src = "";
    }

    async function fetchDetailRain() {
        const gridEl = document.getElementById('rain-grid');
        const avgRainEl = document.getElementById('avg-rain-val');
        const timeMin = Math.floor(Date.now() / 60000);
        const targetUrl = 'https://www.sejong.go.kr/prog/safetyData/safety/sub02_02/rain/rainfallDailyList.do?_=' + timeMin;
        const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`;
        const locs = [{name:'조치원'},{name:'연서'},{name:'전의'},{name:'전동'},{name:'소정'},{name:'부강'},{name:'연동'}];
        
        try {
            const [rainRes, tempRes] = await Promise.all([
                fetch(proxyUrl),
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=36.601,36.560,36.670,36.630,36.720,36.520,36.560&longitude=127.301,127.270,127.200,127.260,127.150,127.370,127.320&current=temperature_2m&timezone=Asia%2FTokyo`)
            ]);
            
            const htmlText = await rainRes.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            const sejongRain = {};
            let headerRow = [], valueRow = [];

            doc.querySelectorAll('table tr').forEach(row => {
                const cells = Array.from(row.querySelectorAll('th, td')).map(c => c.textContent.trim());
                if (cells.some(c => c.includes('조치원'))) headerRow = cells;
                if (cells.some(c => c.includes('합계'))) valueRow = cells;
            });

            if (headerRow.length > 0 && valueRow.length > 0) {
                locs.forEach(loc => {
                    const idx = headerRow.findIndex(h => h.includes(loc.name));
                    if (idx !== -1 && idx < valueRow.length) {
                        const num = parseFloat(valueRow[idx].replace(/,/g, ''));
                        sejongRain[loc.name] = isNaN(num) ? 0 : num;
                    }
                });
            }

            const tempData = await tempRes.json();
            const tempResults = Array.isArray(tempData) ? tempData : [tempData];

            let html = ''; let totalRain = 0; let count = 0;
            locs.forEach((loc, idx) => {
                const todayRain = sejongRain[loc.name] !== undefined ? sejongRain[loc.name] : 0;
                const currentTemp = tempResults[idx]?.current?.temperature_2m ?? '-';
                totalRain += todayRain; count++;
                const valClass = todayRain > 0 ? 'rain-val wet' : 'rain-val';
                const rainColorStyle = todayRain > 0 ? '' : 'color: var(--sub);';
                
                html += `<div class="rain-cell"><div class="rain-loc">${loc.name}</div><div class="${valClass}" style="${rainColorStyle}">${todayRain}<small>mm</small></div><div style="font-size:10px; color:var(--sub); margin-top:4px;">${currentTemp}℃</div></div>`;
            });
            html += `<div class="rain-cell" style="background:var(--card);"><div class="rain-loc" style="color:#fff;">출처</div><div class="rain-val" style="font-size:11px; color:var(--sub);">세종시망</div><div style="font-size:10px; color:var(--green); margin-top:4px;">Live</div></div>`;
            
            gridEl.innerHTML = html;
            avgRainEl.innerText = `${count > 0 ? (totalRain/count).toFixed(1) : '-'} mm`;
        } catch (e) {
            avgRainEl.innerText = "지연";
            gridEl.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:10px; color:var(--orange); font-size:12px;">데이터 수신 지연</div>`;
        }
    }

    async function fetchDetailSnow() {
        const gridEl = document.getElementById('snow-grid');
        const avgSnowEl = document.getElementById('avg-snow-val');
        const locs = [
            { name: '조치원', lat: 36.601, lon: 127.301 }, { name: '연서면', lat: 36.560, lon: 127.270 },
            { name: '전의면', lat: 36.670, lon: 127.200 }, { name: '전동면', lat: 36.630, lon: 127.260 },
            { name: '소정면', lat: 36.720, lon: 127.150 }, { name: '부강면', lat: 36.520, lon: 127.370 }, { name: '연동면', lat: 36.560, lon: 127.320 }
        ];
        const lats = locs.map(l => l.lat).join(',');
        const lons = locs.map(l => l.lon).join(',');
        
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&daily=snowfall_sum&timezone=Asia%2FTokyo`;
            const res = await fetch(url);
            const data = await res.json();
            const results = Array.isArray(data) ? data : [data];
            
            let totalSnow = 0; let html = '';
            results.forEach((r, idx) => {
                const todaySnow = r.daily.snowfall_sum[0] || 0;
                totalSnow += todaySnow;
                const valClass = todaySnow > 0 ? 'rain-val snowing' : 'rain-val';
                const colorStyle = todaySnow > 0 ? '' : 'color: var(--sub);';
                html += `<div class="rain-cell"><div class="rain-loc">${locs[idx].name.replace('면','')}</div><div class="${valClass}" style="${colorStyle}">${todaySnow}<small>cm</small></div></div>`;
            });
            html += `<div class="rain-cell" style="background:var(--card);"><div class="rain-loc" style="color:#fff;">기준</div><div class="rain-val" style="font-size:11px; color:var(--sub);">일누적</div></div>`;
            gridEl.innerHTML = html;
            avgSnowEl.innerText = `${(totalSnow / locs.length).toFixed(1)} cm`;
        } catch(e) { avgSnowEl.innerText = "오류"; }
    }

    async function autoFetchForest() {
        const gridEl = document.getElementById('forest-grid');
        const statusEl = document.getElementById('forest-status-text');
        const API_KEY = "3346a840ceb163dad5ce4127786ff5857a891948859e0749a7e4395ecb156ad0"; 
        const localAreas = "36110250,36110320,36110330,36110360,36110370,36110380,36110390";
        const url = `https://apis.data.go.kr/1400377/forestPoint/forestPointListEmdSearch?serviceKey=${API_KEY}&pageNo=1&numOfRows=10&localAreas=${localAreas}&excludeForecast=0&_type=json`;

        try {
            const res = await fetch(url);
            const text = await res.text();
            if (text.startsWith('<')) { statusEl.innerHTML = "<span style='color:var(--orange); font-size:12px;'>API 승인 대기중</span>"; return; }
            const data = JSON.parse(text);
            const targetNames = ['조치원읍', '연서면', '전의면', '전동면', '소정면', '부강면', '연동면'];
            const results = {};
            targetNames.forEach(name => results[name] = null);

            if(data && data.response && data.response.header && data.response.header.resultCode === "00") {
                let items = data.response.body.items.item;
                if(!Array.isArray(items)) items = [items]; 
                items.forEach(item => { if (item.emd && targetNames.includes(item.emd)) results[item.emd] = parseFloat(item.maxi); });
                
                let html = ''; let totalMax = 0; let validCount = 0;
                targetNames.forEach(name => {
                    const val = results[name];
                    let levelStr = '-'; let color = 'var(--sub)'; let displayVal = '-';
                    if (val !== null && !isNaN(val)) {
                        displayVal = Math.round(val); totalMax += val; validCount++;
                        if (displayVal <= 50) { levelStr = '낮음'; color = 'var(--forest)'; }
                        else if (displayVal <= 65) { levelStr = '보통'; color = 'var(--orange)'; }
                        else if (displayVal <= 85) { levelStr = '높음'; color = 'var(--red)'; }
                        else { levelStr = '매우높음'; color = '#ff375f'; }
                    }
                    const shortName = name.replace('읍', '').replace('면', '');
                    html += `<div class="rain-cell"><div class="rain-loc">${shortName}</div><div class="rain-val" style="color:${color}; font-size:12px;">${levelStr}</div><div style="font-size:10px; color:var(--sub); margin-top:2px;">${displayVal}</div></div>`;
                });
                
                let avgStr = '-'; let avgColor = 'var(--sub)'; let avgVal = '-';
                if (validCount > 0) {
                    avgVal = Math.round(totalMax / validCount);
                    if (avgVal <= 50) { avgStr = '낮음'; avgColor = 'var(--forest)'; }
                    else if (avgVal <= 65) { avgStr = '보통'; avgColor = 'var(--orange)'; }
                    else if (avgVal <= 85) { avgStr = '높음'; avgColor = 'var(--red)'; }
                    else { avgStr = '매우높음'; avgColor = '#ff375f'; }
                }
                html += `<div class="rain-cell" style="background:var(--card);"><div class="rain-loc" style="color:#fff;">7개 평균</div><div class="rain-val" style="color:${avgColor}; font-size:12px;">${avgStr}</div><div style="font-size:10px; color:var(--sub); margin-top:2px;">${avgVal}</div></div>`;
                gridEl.innerHTML = html;
                statusEl.innerHTML = "<span style='color:var(--green); font-size:12px;'>API 정상 수신됨</span>";
            } else { statusEl.innerHTML = `<span style='color:var(--sub); font-size:12px;'>API 상태: 오류</span>`; }
        } catch (e) { statusEl.innerHTML = "<span style='color:var(--red); font-size:12px;'>API 연결 실패</span>"; }
    }

    async function autoFetchSpecial() {
        const contentEl = document.getElementById('monitor-content');
        const headerStatusEl = document.getElementById('sejong-status');
        try {
            const proxyUrl = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent('https://www.weatheri.co.kr/special/special01.php');
            const res = await fetch(proxyUrl);
            const text = await res.text();
            const doc = new DOMParser().parseFromString(text, 'text/html');
            const bodyText = doc.body.innerText || "";
            const timeMatch = bodyText.match(/발효현황\s*[:]?\s*(\d{4}[\.\-]\d{2}[\.\-]\d{2}\s*\d{2}:\d{2})/);
            let timeStr = timeMatch ? timeMatch[1] : "수신중...";
            let sejongAlert = null;
            bodyText.split('\n').forEach(line => {
                if (line.trim().startsWith('o') && line.includes('세종')) sejongAlert = line.match(/(호우|대설|강풍|풍랑|한파|폭염|건조)(주의보|경보)/)?.[0];
            });
            if (sejongAlert) { headerStatusEl.innerText = `세종: ${sejongAlert}`; headerStatusEl.className = "sejong-summary warn"; } 
            else { headerStatusEl.innerText = "세종: 특보 없음"; headerStatusEl.className = "sejong-summary safe"; }
            
            let contentStr = "";
            const uniqueSet = new Set();
            bodyText.split('\n').forEach(line => {
                const trimmed = line.trim();
                if (trimmed.startsWith('o') && (trimmed.includes('주의보') || trimmed.includes('경보'))) uniqueSet.add(trimmed);
            });
            if (uniqueSet.size > 0) { contentStr = Array.from(uniqueSet).map(w => w.replace(/^o\s*/, "🚨 ")).join("<br>"); } 
            else if (bodyText.includes("없습니다")) { contentStr = "<i class='fas fa-check-circle' style='color:var(--green)'></i> 전국 특보 없음"; } 
            else { contentStr = "특보 데이터 없음"; }
            
            contentEl.innerHTML = `<div class="info-group"><span class="info-label">발효시각</span><div class="info-val time">${timeStr}</div></div><div class="info-group"><span class="info-label">전국 특보 내용</span><div class="info-val content">${contentStr}</div></div>`;
        } catch (e) { contentEl.innerHTML = `<div style="text-align:center; color:var(--sub);">대기중...</div>`; headerStatusEl.innerText = "연결 실패"; }
    }

    function renderShelters() {
        const container = document.getElementById('shelter-list');
        container.innerHTML = '';
        const activeBtn = document.querySelector('#sec-shelter .filter-btn.active');
        const filterArea = activeBtn ? activeBtn.innerText : '전체';
        const filteredData = filterArea === '전체' ? shelterData : shelterData.filter(s => s.area === filterArea);
        filteredData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'shelter-card';
            div.innerHTML = `
                <div class="shelter-name">${item.name}</div>
                <div class="shelter-addr">${item.addr}</div>
                <div class="shelter-cap">수용: ${item.cap}</div>
                <div class="shelter-btn-group">
                    <a href="tel:${item.tel}" class="shelter-btn call"><i class="fas fa-phone"></i> 전화</a>
                    <button class="shelter-btn" onclick="openKakaoNavi(${item.lat}, ${item.lng}, '${item.name}')"><i class="fas fa-location-arrow"></i> 길찾기</button>
                </div>
            `;
            container.appendChild(div);
        });
    }
    
    function filterShelter(area, btn) {
        document.querySelectorAll('#sec-shelter .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderShelters(); 
    }

    function openKakaoNavi(lat, lng, name) {
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const appUrl = `kakaomap://route?ep=${lat},${lng}&by=CAR`;
        const webUrl = `https://map.kakao.com/link/to/${encodeURIComponent(name)},${lat},${lng}`;
        if (isMobile) { location.href = appUrl; setTimeout(() => { if (!document.hidden) window.location.href = webUrl; }, 1500); } 
        else { window.open(webUrl, '_blank'); }
    }

    function toggleStatus(idx) {
        if (!isAdmin) return alert("관리자 권한 필요");
        trafficData[idx].status = trafficData[idx].status === 0 ? 2 : 0;
        db.ref('trafficData').set(trafficData);
    }

    function toggleAdmin() {
        if (!isAdmin) {
            if (prompt("비밀번호:") === "2580") { isAdmin = true; document.getElementById('admin-btn').classList.add('active'); document.getElementById('add-loc-btn').style.display = 'block'; render(); }
        } else { isAdmin = false; document.getElementById('admin-btn').classList.remove('active'); document.getElementById('add-loc-btn').style.display = 'none'; render(); }
    }

    function render() {
        const container = document.getElementById('list');
        const searchVal = document.getElementById('search').value.toLowerCase();
        let banCnt = 0; container.innerHTML = '';
        trafficData.forEach((item, idx) => {
            if(item.status === 2) banCnt++;
            if(currFilter === 'ban' && item.status === 0) return;
            if(currFilter === 'free' && item.status !== 0) return;
            if(['조치원','전의','부강'].includes(currFilter) && item.area !== currFilter) return;
            if(searchVal && !item.name.includes(searchVal)) return;
            const div = document.createElement('div');
            div.className = 'traffic-card';
            div.innerHTML = `<div class="card-info"><span class="area-tag">${item.area}</span><div class="loc-name">${item.name}</div></div><div class="status-btn ${item.status===2?'st-ban':'st-free'}" onclick="toggleStatus(${idx})">${item.status===2?'통제':'정상'}</div>`;
            container.appendChild(div);
        });
        document.getElementById('cnt-total').innerText = trafficData.length;
        document.getElementById('cnt-ban').innerText = banCnt;
    }

    function setFilter(type, btn) {
        currFilter = type; document.querySelectorAll('.filter-area .filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render();
    }

    function addTrafficLocation() {
        const area = prompt("지역 입력 (예: 조치원)"); if (!area) return;
        const name = prompt("장소명 입력"); if (!name) return;
        trafficData.push({ id: Date.now(), area: area, name: name, status: 0 });
        db.ref('trafficData').set(trafficData);
    }

    function resetData() {
        if (!isAdmin) return;
        if(confirm('초기화하시겠습니까?')) db.ref('trafficData').set(defaultData);
    }
</script>
